{{define "theme_toggle"}}
<div class="theme-toggle-pill" role="group" aria-label="Theme">
  <button type="button"
          data-theme-choice="system"
          aria-pressed="{{if eq .FmTheme "system"}}true{{else}}false{{end}}"
          aria-label="Use system theme"
          hx-post="/preferences/theme"
          hx-vals='{"value":"system"}'
          hx-swap="none">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/>
    </svg>
  </button>
  <button type="button"
          data-theme-choice="light"
          aria-pressed="{{if eq .FmTheme "light"}}true{{else}}false{{end}}"
          aria-label="Use light theme"
          hx-post="/preferences/theme"
          hx-vals='{"value":"light"}'
          hx-swap="none">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>
  <button type="button"
          data-theme-choice="dark"
          aria-pressed="{{if eq .FmTheme "dark"}}true{{else}}false{{end}}"
          aria-label="Use dark theme"
          hx-post="/preferences/theme"
          hx-vals='{"value":"dark"}'
          hx-swap="none">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 13A8 8 0 1 1 11 3a6 6 0 0 0 10 10Z"/>
    </svg>
  </button>
</div>
{{end}}
