{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-theme="{{.FmTheme}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
(function(){var d=document.documentElement,t=d.getAttribute('data-theme');
if(t==='system'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';d.setAttribute('data-theme',t);}
d.classList.toggle('dark',t==='dark');})();
    </script>
    <link rel="icon" href="/static/vendor/img/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/static/vendor/img/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="/static/vendor/img/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/static/vendor/img/apple-touch-icon.png" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="FieldMark · Go/Fiber + HTMX inspection management reference" />
    <meta property="og:title" content="FieldMark" />
    <meta property="og:description" content="Server-authoritative HTMX architecture — three stacks, one domain." />
    <meta property="og:image" content="/static/vendor/img/fieldmark-og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>{{.Title}} — FieldMark</title>
    <link rel="stylesheet" href="/static/vendor/fieldmark.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

{{template "header" .}}

<main id="main-content">
    {{template "flash_region" .}}
    {{embed}}
</main>

{{template "footer" .}}

{{/* AG Grid must load before HTMX so grid initialisation in HTMX-swapped
     fragments can reference the agGrid global immediately. */}}
<script src="/static/vendor/ag-grid/35.3.0/ag-grid-enterprise.min.js"></script>
<script src="/static/vendor/htmx/htmx.min.js"></script>
<script>htmx.config.implicitInheritance = true;</script>
<script src="/static/vendor/theme-toggle/theme-toggle.js"></script>
<script src="/static/vendor/tabstrip/tabstrip.js" defer></script>

</body>
</html>
{{end}}
