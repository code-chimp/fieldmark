{{template "base" .}}

{{define "title"}}Dashboard{{end}}

{{define "content"}}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    {{/* Compliance tile — loaded and refreshed via HTMX */}}
    <div
        id="compliance-tile"
        hx-get="/fragments/compliance-tile"
        hx-trigger="load"
        class="bg-white rounded border p-4 shadow-sm">
        <p class="text-sm text-gray-400">Loading compliance score…</p>
    </div>
</div>

<p class="text-sm text-gray-500">Go (Fiber) stack — standup milestone placeholder.</p>
{{end}}
