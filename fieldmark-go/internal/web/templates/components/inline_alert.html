{{ define "inline_alert" -}}
{{/* Contract: docs/reference/component-canonical-examples.md */ -}}
<div class="alert {{ .AlertClass }}" role="{{ .Role }}">
  {{ if eq .Icon "warning" -}}<svg aria-hidden="true" class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>{{- else if eq .Icon "success" -}}<svg aria-hidden="true" class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>{{- else -}}<svg aria-hidden="true" class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>{{- end }}
  <strong class="alert-title">{{ .Title }}</strong>
  <p class="alert-message">{{ .Message }}</p>
  {{- if .Meta }}
  <p class="alert-meta">{{ .Meta }}</p>
  {{- end }}
</div>
{{- end }}
