{{ define "action_button" -}}
{{- if .Permission -}}
{{- if .StateAllows -}}
<button
  type="button"
  id="{{ .ID }}"
  class="btn btn-primary"
  {{ if .HxGet }}hx-get="{{ .HxGet }}"{{ else }}hx-post="{{ .HxPost }}"{{ end }}
  hx-target="{{ .HxTarget }}"
  hx-swap="{{ if .HxSwap }}{{ .HxSwap }}{{ else }}outerHTML{{ end }}"
  hx-disabled-elt="this"
>{{ .Label }}</button>
{{- else -}}
<button
  type="button"
  id="{{ .ID }}"
  class="btn btn-secondary"
  disabled
  aria-disabled="true"
  tabindex="0"
  data-tooltip="{{ .DisabledReason }}"
  aria-describedby="{{ .ID }}-reason"
>{{ .Label }}</button>
<span id="{{ .ID }}-reason" class="sr-only">{{ .DisabledReason }}</span>
{{- end -}}
{{- end -}}
{{- end }}
