# Ruff: lint only (`uv run ruff check .`). Format with Black (`uv run black .`).
# Do not use `ruff format` — Black is the project formatter (QA checklist).
line-length = 88
target-version = "py314"

[lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = ["E501"]

[lint.mccabe]
max-complexity = 10