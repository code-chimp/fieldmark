services:
  postgres:
    image: postgres:17
    container_name: fieldmark-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: fieldmark
      POSTGRES_USER: fieldmark
      POSTGRES_PASSWORD: fieldmark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
