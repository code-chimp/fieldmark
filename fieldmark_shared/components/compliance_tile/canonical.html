<!--
ComplianceTile component canonical fixture.

fixture:
  score: int? (0–100, null for no-data)
  label: string
  context: "project" | "portfolio"
  id: string (caller-supplied)

Threshold bands (UX-DR §"Compliance score thresholds"):
  ≥ 90 → Healthy  (text-success)
  70–89 → Watch    (text-warning)
  50–69 → Concern  (text-warning-strong)
  < 50  → Critical (text-danger)
  null  → no-data  (text-neutral, threshold <p> omitted)
-->

<!-- variant: healthy-project (inputs: score=95, label=Compliance, context=project, id=compliance-tile) -->
<section aria-atomic="true" aria-live="polite" class="compliance-tile" id="compliance-tile" role="status">
  <p class="compliance-tile__label">Compliance</p>
  <p class="compliance-tile__value text-3xl font-bold tnum text-success">95</p>
  <p class="compliance-tile__threshold text-success">Healthy</p>
</section>
